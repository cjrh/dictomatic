# Link the static musl targets with the bundled rust-lld. lld cross-links, so a
# single x86_64 host can build the aarch64 musl binary too — no external musl
# toolchain or cross linker needed (rust-lld must be on PATH; see release.yml).
[target.x86_64-unknown-linux-musl]
linker = "rust-lld"

[target.aarch64-unknown-linux-musl]
linker = "rust-lld"
